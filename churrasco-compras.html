<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Compras do Fim de Semana 🥂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#3B6D11;--green-l:#EAF3DE;--green-m:#639922;--green-b:#C0DD97;
  --amber:#854F0B;--amber-l:#FAEEDA;--amber-b:#FAC775;
  --coral:#993C1D;--coral-l:#FAECE7;--coral-b:#F5C4B3;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --gray:#5F5E5A;--gray-l:#F1EFE8;--gray-b:#D3D1C7;
  --text:#1a1a18;--muted:#888780;--hint:#B4B2A9;
  --bg:#ffffff;--surface:#F8F6F0;--border:#e0ded8;
  --radius:14px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --text:#F1EFE8;--muted:#888780;--hint:#5F5E5A;
    --bg:#1e1e1c;--surface:#2a2a27;--border:#3a3a37;
  }
}
body{font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--surface);min-height:100vh}
h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:600}
h2{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;margin-bottom:12px}

/* Header */
.header{background:var(--bg);padding:1.1rem 1rem 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.share-btn{background:var(--green-l);border:1px solid var(--green-b);color:var(--green);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s}
.share-btn:active{background:var(--green-b)}

/* Tabs */
.tabs{display:flex;gap:0;background:var(--bg)}
.tab{flex:1;padding:9px 4px;font-size:13px;font-weight:500;text-align:center;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

/* Content */
.section{display:none;padding:1rem}
.section.active{display:block}

/* Cards */
.meal-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.meal-header{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.meal-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.meal-title{font-weight:500;font-size:14px;flex:1}
.meal-count{font-size:12px;color:var(--muted)}
.meal-body{padding:10px 14px}

/* Items */
.item-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none;padding-bottom:0}
.item-row:first-child{padding-top:0}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg)}
.item-check.done{background:var(--green-m);border-color:var(--green-m)}
.item-check.done::after{content:'✓';font-size:12px;color:#fff;font-weight:600}
.item-label{flex:1;font-size:14px;transition:all .2s}
.item-label.done{text-decoration:line-through;color:var(--hint)}
.item-qty{display:flex;align-items:center;gap:4px}
input[type=number]{width:48px;border:1px solid var(--border);border-radius:6px;padding:3px 5px;font-size:12px;text-align:center;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
input[type=number]:focus{border-color:var(--green)}
.unit-label{font-size:11px;color:var(--muted);min-width:28px}
.item-del{width:22px;height:22px;border:none;background:none;color:var(--hint);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;transition:all .15s}
.item-del:hover{background:var(--coral-l);color:var(--coral)}

/* Add row */
.add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.add-input{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.add-input:focus{border-color:var(--green)}
.add-unit{width:70px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 6px;font-size:12px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.add-unit:focus{border-color:var(--green)}
.add-btn{background:var(--green-l);border:1px solid var(--green-b);color:var(--green);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.add-btn:active{background:var(--green-b)}

/* Day chips */
.day-chips{display:flex;gap:8px;margin-bottom:1rem}
.day-chip{flex:1;padding:8px 6px;border-radius:20px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .2s}
.day-chip.sel{background:var(--green-m);color:#fff;border-color:var(--green-m)}
.day-chip:not(.sel){background:var(--bg);border-color:var(--border);color:var(--muted)}

/* Summary */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:500;line-height:1;font-family:'Playfair Display',serif}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.progress-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:1.25rem}
.progress-bar{height:8px;background:var(--surface);border-radius:4px;overflow:hidden;margin:8px 0 6px}
.progress-fill{height:100%;background:var(--green-m);border-radius:4px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--muted);display:flex;justify-content:space-between}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.b-g{background:var(--green-l);color:var(--green)}
.b-a{background:var(--amber-l);color:var(--amber)}
.b-c{background:var(--coral-l);color:var(--coral)}

/* Section note */
.note{font-size:12px;color:var(--green);background:var(--green-l);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;border-left:3px solid var(--green-m)}

/* Share modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem 1rem;width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem}
.modal h2{margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:1rem}
.link-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px}
.link-text{flex:1;font-size:12px;color:var(--muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:all .15s}
.copy-btn:active{opacity:.8}
.copy-success{font-size:12px;color:var(--green);text-align:center;margin-top:4px;height:18px}
.close-modal{width:100%;margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text)}

/* Sync indicator */
.sync{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green-m)}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:200;transition:transform .3s ease;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Compras do Fim de Semana 🥂</h1>
    <button class="share-btn" onclick="openShare()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartilhar
    </button>
  </div>
  <div class="header-sub" id="sync-status">
    <span class="sync"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Carregando...</span></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('cafe')">Café da Manhã</button>
    <button class="tab" onclick="showTab('refeicoes')">Almoço & Jantar</button>
    <button class="tab" onclick="showTab('resumo')">Resumo</button>
  </div>
</div>

<div id="tab-cafe" class="section active">
  <p class="note">Esses itens cobrem os 3 dias — compre de uma vez só!</p>
  <div id="cafe-cards"></div>
</div>

<div id="tab-refeicoes" class="section">
  <div class="day-chips">
    <span class="day-chip sel" onclick="selectDay(this,'sex')">Sexta</span>
    <span class="day-chip" onclick="selectDay(this,'sab')">Sábado</span>
    <span class="day-chip" onclick="selectDay(this,'dom')">Domingo</span>
  </div>
  <div id="refeicoes-cards"></div>
</div>

<div id="tab-resumo" class="section">
  <div class="summary-grid" id="stat-grid"></div>
  <div class="progress-wrap">
    <div style="font-size:13px;font-weight:500;margin-bottom:2px">Progresso geral</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label"><span id="prog-done">0 comprados</span><span id="prog-pct">0%</span></div>
  </div>
  <h2>Itens pendentes</h2>
  <div id="resumo-list"></div>
</div>

<!-- Share Modal -->
<div class="overlay" id="overlay" onclick="closeShareIfOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Compartilhar lista</h2>
    <p class="modal-sub">Qualquer pessoa com o link pode ver e editar a lista em tempo real.</p>
    <div class="link-box">
      <span class="link-text" id="share-link-text">Gerando link...</span>
      <button class="copy-btn" onclick="copyLink()">Copiar</button>
    </div>
    <div class="copy-success" id="copy-msg"></div>
    <button class="close-modal" onclick="closeShare()">Fechar</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Storage key based on URL hash (shared session) ──────────────────────────
const STORAGE_KEY = (() => {
  let hash = location.hash.replace('#','');
  if(!hash || hash.length < 8){
    hash = Math.random().toString(36).slice(2,10);
    history.replaceState(null,'','#'+hash);
  }
  return 'gather_'+hash;
})();

// ── Default data ─────────────────────────────────────────────────────────────
const DEFAULT = {
  cafe: {
    'Laticínios & Ovos': [
      {id:'be1',name:'Ovos',qty:18,unit:'unid.',done:false},
      {id:'be2',name:'Leite',qty:2,unit:'litros',done:false},
      {id:'be3',name:'Manteiga',qty:200,unit:'g',done:false},
      {id:'be4',name:'Iogurte',qty:6,unit:'unid.',done:false},
    ],
    'Pães & Doces': [
      {id:'bb1',name:'Pão de forma',qty:2,unit:'un.',done:false},
      {id:'bb2',name:'Croissants',qty:9,unit:'unid.',done:false},
      {id:'bb3',name:'Granola',qty:500,unit:'g',done:false},
      {id:'bb4',name:'Bolo de fubá',qty:1,unit:'unid.',done:false},
    ],
    'Frutas & Acompanhamentos': [
      {id:'bf1',name:'Banana',qty:6,unit:'unid.',done:false},
      {id:'bf2',name:'Morango',qty:500,unit:'g',done:false},
      {id:'bf3',name:'Suco de laranja',qty:2,unit:'litros',done:false},
      {id:'bf4',name:'Geleia',qty:2,unit:'potes',done:false},
      {id:'bf5',name:'Mel',qty:1,unit:'pote',done:false},
    ],
    'Bebidas': [
      {id:'bv1',name:'Café moído',qty:500,unit:'g',done:false},
      {id:'bv2',name:'Chá (sachês)',qty:1,unit:'caixa',done:false},
      {id:'bv3',name:'Açúcar',qty:500,unit:'g',done:false},
    ],
  },
  refeicoes: {
    sex: {
      almoco: [
        {id:'fl1',name:'Pão ciabatta',qty:2,unit:'un.',done:false},
        {id:'fl2',name:'Presunto fatiado',qty:300,unit:'g',done:false},
        {id:'fl3',name:'Mussarela de búfala',qty:250,unit:'g',done:false},
        {id:'fl4',name:'Tomate',qty:6,unit:'unid.',done:false},
        {id:'fl5',name:'Mix de folhas',qty:200,unit:'g',done:false},
        {id:'fl6',name:'Azeite',qty:1,unit:'garrafa',done:false},
      ],
      jantar: [
        {id:'fd1',name:'Coxa de frango',qty:1.5,unit:'kg',done:false},
        {id:'fd2',name:'Alho',qty:1,unit:'cabeça',done:false},
        {id:'fd3',name:'Batata',qty:1,unit:'kg',done:false},
        {id:'fd4',name:'Limão siciliano',qty:3,unit:'unid.',done:false},
        {id:'fd5',name:'Alecrim',qty:1,unit:'maço',done:false},
        {id:'fd6',name:'Vinho branco seco',qty:1,unit:'garrafa',done:false},
      ],
    },
    sab: {
      almoco: [
        {id:'sl1',name:'Macarrão penne',qty:500,unit:'g',done:false},
        {id:'sl2',name:'Tomate pelado (lata)',qty:2,unit:'latas',done:false},
        {id:'sl3',name:'Carne moída',qty:500,unit:'g',done:false},
        {id:'sl4',name:'Cebola',qty:2,unit:'unid.',done:false},
        {id:'sl5',name:'Parmesão',qty:150,unit:'g',done:false},
        {id:'sl6',name:'Manjericão fresco',qty:1,unit:'maço',done:false},
      ],
      jantar: [
        {id:'sd1',name:'Filé de salmão',qty:4,unit:'filés',done:false},
        {id:'sd2',name:'Aspargo',qty:400,unit:'g',done:false},
        {id:'sd3',name:'Alcaparra',qty:1,unit:'pote',done:false},
        {id:'sd4',name:'Mostarda Dijon',qty:1,unit:'pote',done:false},
        {id:'sd5',name:'Batata baby',qty:800,unit:'g',done:false},
        {id:'sd6',name:'Endro (dill)',qty:1,unit:'maço',done:false},
      ],
    },
    dom: {
      almoco: [
        {id:'sul1',name:'Pão de hambúrguer',qty:8,unit:'unid.',done:false},
        {id:'sul2',name:'Hambúrguer artesanal',qty:800,unit:'g',done:false},
        {id:'sul3',name:'Queijo cheddar',qty:200,unit:'g',done:false},
        {id:'sul4',name:'Alface americana',qty:1,unit:'pé',done:false},
        {id:'sul5',name:'Ketchup e maionese',qty:2,unit:'potes',done:false},
        {id:'sul6',name:'Picles',qty:1,unit:'pote',done:false},
      ],
      jantar: [
        {id:'sud1',name:'Arroz arbóreo (risoto)',qty:400,unit:'g',done:false},
        {id:'sud2',name:'Caldo de frango',qty:1,unit:'litro',done:false},
        {id:'sud3',name:'Cogumelo shitake',qty:300,unit:'g',done:false},
        {id:'sud4',name:'Cebola branca',qty:1,unit:'unid.',done:false},
        {id:'sud5',name:'Parmesão (risoto)',qty:100,unit:'g',done:false},
        {id:'sud6',name:'Vinho branco (risoto)',qty:1,unit:'garrafa',done:false},
      ],
    }
  }
};

// ── State ─────────────────────────────────────────────────────────────────────
let store = JSON.parse(JSON.stringify(DEFAULT));
let currentDay = 'sex';
let syncTimer = null;
let lastSaved = null;

// ── LocalStorage sync (shared via URL hash) ───────────────────────────────────
function saveData(){
  try{
    const payload = JSON.stringify({v:1, ts:Date.now(), data:store});
    localStorage.setItem(STORAGE_KEY, payload);
    setSyncStatus('saved');
  }catch(e){}
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.data){
        store = parsed.data;
        return true;
      }
    }
  }catch(e){}
  return false;
}

function setSyncStatus(state){
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if(state==='saved'){dot.className='sync-dot';txt.textContent='Salvo automaticamente'}
  else if(state==='syncing'){dot.className='sync-dot syncing';txt.textContent='Salvando...'}
  else{dot.className='sync-dot';txt.textContent='Pronto para editar'}
}

function scheduleSave(){
  setSyncStatus('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{saveData();renderSummary();},600);
}

// Poll for changes from other tabs/devices
setInterval(()=>{
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(parsed && parsed.ts && parsed.ts !== lastSaved){
      lastSaved = parsed.ts;
      store = parsed.data;
      renderAll();
    }
  }catch(e){}
},2000);

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid(){return 'i'+Date.now()+Math.random().toString(36).slice(2,6)}

function findItem(id){
  for(const g of Object.values(store.cafe)){
    const f=g.find(i=>i.id===id);if(f)return f;
  }
  for(const d of ['sex','sab','dom']){
    for(const m of ['almoco','jantar']){
      const f=store.refeicoes[d][m].find(i=>i.id===id);
      if(f)return f;
    }
  }
  return null;
}

function allItems(){
  const items=[];
  Object.values(store.cafe).forEach(g=>g.forEach(i=>items.push(i)));
  ['sex','sab','dom'].forEach(d=>{
    ['almoco','jantar'].forEach(m=>{
      store.refeicoes[d][m].forEach(i=>items.push(i));
    });
  });
  return items;
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderItemRow(item, delCallback){
  return `<div class="item-row" id="row-${item.id}">
    <div class="item-check ${item.done?'done':''}" onclick="toggle('${item.id}')"></div>
    <span class="item-label ${item.done?'done':''}">${item.name}</span>
    <div class="item-qty">
      <input type="number" min="0" step="0.5" value="${item.qty}" onchange="updateQty('${item.id}',this.value)" />
      <span class="unit-label">${item.unit}</span>
    </div>
    <button class="item-del" onclick="${delCallback}" title="Remover">×</button>
  </div>`;
}

function groupIcon(g){
  if(g.includes('Laticínios')) return '🥛';
  if(g.includes('Pães')) return '🥐';
  if(g.includes('Frutas')) return '🍓';
  if(g.includes('Bebidas')) return '☕';
  return '🛒';
}

// ── Render Café ───────────────────────────────────────────────────────────────
function renderCafe(){
  const el=document.getElementById('cafe-cards');
  let html='';
  for(const [group, items] of Object.entries(store.cafe)){
    const gkey=group.replace(/\s/g,'_');
    html+=`<div class="meal-card">
      <div class="meal-header">
        <div class="meal-icon">${groupIcon(group)}</div>
        <span class="meal-title">${group}</span>
        <span class="meal-count">${items.filter(i=>i.done).length}/${items.length}</span>
      </div>
      <div class="meal-body">
        ${items.map(it=>renderItemRow(it,`delCafeItem('${group}','${it.id}')`)).join('')}
        <div class="add-row">
          <input class="add-input" id="ai-${gkey}" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addCafeItem('${group}','${gkey}')" />
          <input class="add-unit" id="au-${gkey}" placeholder="unid." value="unid." />
          <button class="add-btn" onclick="addCafeItem('${group}','${gkey}')">+ Add</button>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function addCafeItem(group,gkey){
  const val=document.getElementById('ai-'+gkey)?.value?.trim();
  const unit=document.getElementById('au-'+gkey)?.value?.trim()||'unid.';
  if(!val)return;
  store.cafe[group].push({id:uid(),name:val,qty:1,unit,done:false});
  document.getElementById('ai-'+gkey).value='';
  renderCafe();scheduleSave();toast('Item adicionado!');
}

function delCafeItem(group,id){
  store.cafe[group]=store.cafe[group].filter(i=>i.id!==id);
  renderCafe();scheduleSave();
}

// ── Render Refeições ──────────────────────────────────────────────────────────
const DAY_LABEL={sex:'Sexta-feira',sab:'Sábado',dom:'Domingo'};
const MEAL_LABEL={almoco:'☀️ Almoço',jantar:'🌙 Jantar'};
const MEAL_CLS={almoco:'b-a',jantar:'b-c'};

function renderRefeicoes(){
  const el=document.getElementById('refeicoes-cards');
  const d=currentDay;
  let html=`<div style="font-size:13px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">${DAY_LABEL[d]}</div>`;
  for(const meal of ['almoco','jantar']){
    const items=store.refeicoes[d][meal];
    const mkey=`${d}_${meal}`;
    html+=`<div class="meal-card">
      <div class="meal-header">
        <span class="meal-title">${MEAL_LABEL[meal]}</span>
        <span class="meal-count">${items.filter(i=>i.done).length}/${items.length}</span>
      </div>
      <div class="meal-body">
        ${items.map(it=>renderItemRow(it,`delMealItem('${d}','${meal}','${it.id}')`)).join('')}
        <div class="add-row">
          <input class="add-input" id="mi-${mkey}" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addMealItem('${d}','${meal}','${mkey}')" />
          <input class="add-unit" id="mu-${mkey}" placeholder="unid." value="unid." />
          <button class="add-btn" onclick="addMealItem('${d}','${meal}','${mkey}')">+ Add</button>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function addMealItem(day,meal,mkey){
  const val=document.getElementById('mi-'+mkey)?.value?.trim();
  const unit=document.getElementById('mu-'+mkey)?.value?.trim()||'unid.';
  if(!val)return;
  store.refeicoes[day][meal].push({id:uid(),name:val,qty:1,unit,done:false});
  document.getElementById('mi-'+mkey).value='';
  renderRefeicoes();scheduleSave();toast('Item adicionado!');
}

function delMealItem(day,meal,id){
  store.refeicoes[day][meal]=store.refeicoes[day][meal].filter(i=>i.id!==id);
  renderRefeicoes();scheduleSave();
}

// ── Render Resumo ─────────────────────────────────────────────────────────────
function renderSummary(){
  const all=allItems();
  const total=all.length;
  const done=all.filter(i=>i.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total de itens</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Já comprados</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${total-done}</div><div class="stat-label">Ainda faltam</div></div>
    <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Completo</div></div>
  `;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-done').textContent=`${done} comprados`;
  document.getElementById('prog-pct').textContent=pct+'%';

  const sections=[
    {label:'Café da Manhã (todos os dias)',cls:'b-g',items:Object.values(store.cafe).flat()},
    {label:'Sexta · Almoço',cls:'b-a',items:store.refeicoes.sex.almoco},
    {label:'Sexta · Jantar',cls:'b-c',items:store.refeicoes.sex.jantar},
    {label:'Sábado · Almoço',cls:'b-a',items:store.refeicoes.sab.almoco},
    {label:'Sábado · Jantar',cls:'b-c',items:store.refeicoes.sab.jantar},
    {label:'Domingo · Almoço',cls:'b-a',items:store.refeicoes.dom.almoco},
    {label:'Domingo · Jantar',cls:'b-c',items:store.refeicoes.dom.jantar},
  ];
  let html='';
  sections.forEach(s=>{
    const pending=s.items.filter(i=>!i.done);
    if(!pending.length)return;
    html+=`<div style="margin-bottom:14px">
      <div class="badge ${s.cls}" style="margin-bottom:8px">${s.label} · ${pending.length} itens</div>
      ${pending.map(i=>`<div class="item-row">
        <div class="item-check ${i.done?'done':''}" onclick="toggle('${i.id}')"></div>
        <span class="item-label">${i.name}</span>
        <span style="font-size:12px;color:var(--muted)">${i.qty} ${i.unit}</span>
      </div>`).join('')}
    </div>`;
  });
  if(!html)html=`<div style="text-align:center;padding:2rem;color:var(--muted)">Tudo comprado! 🎉</div>`;
  document.getElementById('resumo-list').innerHTML=html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggle(id){
  const item=findItem(id);
  if(item){item.done=!item.done;}
  renderAll();scheduleSave();
}

function updateQty(id,val){
  const item=findItem(id);
  if(item)item.qty=parseFloat(val)||0;
  scheduleSave();
}

function renderAll(){
  renderCafe();renderRefeicoes();renderSummary();
}

function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const idx={'cafe':0,'refeicoes':1,'resumo':2}[t];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function selectDay(el,day){
  document.querySelectorAll('.day-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  currentDay=day;
  renderRefeicoes();
}

// ── Share ─────────────────────────────────────────────────────────────────────
function openShare(){
  const url=location.href;
  document.getElementById('share-link-text').textContent=url;
  document.getElementById('overlay').classList.add('open');
}
function closeShare(){document.getElementById('overlay').classList.remove('open')}
function closeShareIfOutside(e){if(e.target===document.getElementById('overlay'))closeShare();}
function copyLink(){
  const url=location.href;
  navigator.clipboard.writeText(url).then(()=>{
    document.getElementById('copy-msg').textContent='✓ Link copiado!';
    setTimeout(()=>document.getElementById('copy-msg').textContent='',3000);
  }).catch(()=>{
    document.getElementById('share-link-text').select?.();
    toast('Copie o link manualmente');
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
const loaded=loadData();
lastSaved=Date.now();
renderAll();
setSyncStatus(loaded?'ready':'ready');
if(!loaded)saveData();
</script>
</body>
</html>
